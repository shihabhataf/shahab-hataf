{% extends 'base.html' %}
{% block title %}إدارة الوسوم{% endblock %}
{% block content %}
<div class="admin-page">
  <div class="admin-header">
    <h1># إدارة الوسوم</h1>
    <div class="admin-nav">
      <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link">⌶ نظرة عامة</a>
      <a href="{{ url_for('admin.articles') }}" class="admin-nav-link">✍ المقالات</a>
      <a href="{{ url_for('admin.users') }}" class="admin-nav-link">☵ المستخدمون</a>
      <a href="{{ url_for('admin.categories') }}" class="admin-nav-link">📁 التصنيفات</a>
      <a href="{{ url_for('admin.tags') }}" class="admin-nav-link active"># الوسوم</a>
    </div>
  </div>
  <div class="admin-panel">
    <div class="tags-cloud">
      {% for tag in tags %}
      <div class="tag-manage-item">
        <a href="{{ url_for('main.tag', slug=tag.slug) }}" class="tag-pill">{{ tag.name }}</a>
        <span class="tag-count">({{ tag.articles.count() }})</span>
        <form action="{{ url_for('admin.delete_tag', id=tag.id) }}" method="POST" style="display:inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn btn-xs btn-danger" onclick="return confirm('حذف؟')">✕</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
